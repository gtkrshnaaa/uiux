<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchandise | Bean & Bloom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { serene: { cream: '#fdfcf8', sage: '#e2e7d6', clay: '#d4a373', ink: '#2a2a2a' } }, fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], serif: ['"Playfair Display"', 'serif'] } } } }
    </script>
</head>
<body class="bg-serene-cream text-serene-ink font-sans">
    <header class="p-12 flex justify-between items-start">
        <a href="../../index.html" class="text-xl font-serif italic">Bean & Bloom</a>
        <nav class="flex gap-8 text-[10px] uppercase tracking-widest opacity-40">
            <a href="index.html">Shop Home</a>
        </nav>
    </header>
    <main class="max-w-6xl mx-auto px-8 py-20">
        <span class="text-[10px] uppercase tracking-[0.6em] text-serene-clay mb-8 block">Aesthetic Goods</span>
        <h1 class="text-6xl font-light mb-20">The <span class="font-serif italic text-serene-clay">Lifestyle</span> Edit.</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="group space-y-6">
                <div class="aspect-[3/4] bg-serene-sage/10 rounded-2xl group-hover:bg-serene-sage/20 transition-colors"></div>
                <h3 class="text-2xl font-serif italic">The Bloom Vessel</h3>
                <p class="text-sm opacity-60">Matte ceramic cup, minimalist profile.</p>
                <p class="font-semibold text-serene-clay">$32.00</p>
            </div>
            <div class="group space-y-6">
                <div class="aspect-[3/4] bg-serene-sage/10 rounded-2xl group-hover:bg-serene-sage/20 transition-colors"></div>
                <h3 class="text-2xl font-serif italic">Cotton Tote</h3>
                <p class="text-sm opacity-60">Organic cotton, embroidered logo.</p>
                <p class="font-semibold text-serene-clay">$18.00</p>
            </div>
            <div class="group space-y-6">
                <div class="aspect-[3/4] bg-serene-sage/10 rounded-2xl group-hover:bg-serene-sage/20 transition-colors"></div>
                <h3 class="text-2xl font-serif italic">Still Candle</h3>
                <p class="text-sm opacity-60">Notes of coffee flower and sandalwood.</p>
                <p class="font-semibold text-serene-clay">$28.00</p>
            </div>
        </div>
    </main>
    <footer class="p-12 text-center text-[10px] uppercase tracking-widest opacity-40">
        &copy; 2026 Bean & Bloom
    </footer>
</body>
</html>
