<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | Bean & Bloom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { serene: { cream: '#fdfcf8', sage: '#e2e7d6', clay: '#d4a373', ink: '#2a2a2a' } }, fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], serif: ['"Playfair Display"', 'serif'] } } } }
    </script>
</head>
<body class="bg-serene-cream text-serene-ink font-sans">
    <header class="p-12 flex justify-between items-start">
        <a href="../index.html" class="text-xl font-serif italic">Bean & Bloom</a>
    </header>
    <main class="max-w-6xl mx-auto px-8 py-20">
        <span class="text-[10px] uppercase tracking-[0.6em] text-serene-clay mb-8 block">The Journal</span>
        <h1 class="text-6xl md:text-8xl font-light mb-20">Stories & <span class="font-serif italic text-serene-clay">Sips</span>.</h1>
        <div class="space-y-32">
            <a href="roasting-process.html" class="group block">
                <div class="aspect-video bg-serene-sage/10 rounded-[3rem] overflow-hidden mb-8 relative">
                    <div class="absolute inset-0 flex items-center justify-center opacity-20 italic">Art of Roasting</div>
                </div>
                <div class="max-w-2xl">
                    <span class="text-[10px] uppercase tracking-widest opacity-40 mb-4 block">Craft / 02 March 2026</span>
                    <h2 class="text-4xl font-serif italic mb-6 group-hover:text-serene-clay transition-colors">The Alchemy of Light Roasting</h2>
                    <p class="text-lg font-light opacity-60 leading-relaxed">Exploring the delicate balance of heat and time that reveals the floral soul of the coffee bean.</p>
                </div>
            </a>
        </div>
    </main>
    <footer class="p-12 text-center text-[10px] uppercase tracking-widest opacity-40">
        &copy; 2026 Bean & Bloom
    </footer>
</body>
</html>
